name: Publish npm packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    concurrency:
      group: npm-publish-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify

      - name: Build npm runner packages
        run: bun run build:npm-cli

      - name: Package dry run
        run: bun run pack:dry-run

      - name: Publish packages
        run: |
          set -euo pipefail

          for package_dir in \
            packages/npm/model-analysis-cli-darwin-arm64 \
            packages/npm/model-analysis-cli-darwin-x64 \
            packages/npm/model-analysis-cli-linux-arm64 \
            packages/npm/model-analysis-cli-linux-x64 \
            packages/npm/model-analysis-cli
          do
            name=$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync('${package_dir}/package.json', 'utf8')); console.log(pkg.name)")
            version=$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync('${package_dir}/package.json', 'utf8')); console.log(pkg.version)")

            if npm view "${name}@${version}" version --prefer-online >/dev/null 2>&1; then
              echo "Skipping ${name}@${version}; already published"
              continue
            fi

            echo "Publishing ${name}@${version} from ${package_dir}"
            npm publish "./${package_dir}" --access public
          done
