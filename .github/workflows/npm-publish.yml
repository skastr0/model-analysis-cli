name: Publish package to npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    concurrency:
      group: npm-publish-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify

      - name: Package dry run
        run: npm pack --dry-run

      - name: Ensure package version is unpublished
        run: |
          name=$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); console.log(pkg.name)")
          version=$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); console.log(pkg.version)")
          if npm view "${name}@${version}" version --prefer-online >/dev/null 2>&1; then
            echo "${name}@${version} is already published"
            exit 1
          fi

      - name: Publish
        run: npm publish --access public
